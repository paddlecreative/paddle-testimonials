<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Creative - Selected Work</title>
<style>
  /* ============================================================
     PADDLE CREATIVE - WORK CARDS EMBED
     Single row with horizontal scroll fallback
     ============================================================ */
  html, body {
    background: #EEE3F0 !important;
    margin: 0;
    padding: 0;
  }
  *, *::before, *::after { box-sizing: border-box; }

  .pc-work-embed {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #0E114D;
    padding: 24px 0;
    width: 100%;
  }

  /* Horizontal scroll container */
  .pc-work-scroller {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #0E114D33 transparent;
    padding-bottom: 8px;
  }
  .pc-work-scroller::-webkit-scrollbar {
    height: 6px;
  }
  .pc-work-scroller::-webkit-scrollbar-track {
    background: transparent;
  }
  .pc-work-scroller::-webkit-scrollbar-thumb {
    background: #0E114D33;
    border-radius: 999px;
  }

  /* Single row, always */
  .pc-work-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 32px;
    min-width: min-content;
  }

  .pc-card {
    flex: 1 1 0;
    min-width: 280px;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s ease;
  }
  .pc-card:hover {
    transform: translateY(-4px);
  }
  .pc-card:hover .pc-card-image {
    box-shadow: 0 12px 32px rgba(14, 17, 77, 0.12);
  }

  .pc-card-image {
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 16px;
    overflow: hidden;
    background: #F2F2F2;
    display: block;
    transition: box-shadow 0.25s ease;
  }
  .pc-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .pc-card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }

  .pc-card-brand {
    font-size: 20px;
    font-weight: 600;
    color: #0E114D;
    margin: 0;
  }

  .pc-pill {
    display: inline-block;
    padding: 4px 10px;
    background: #E0F2F1;
    color: #0E114D;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .pc-card-services {
    margin-top: 8px;
    font-size: 13px;
    color: #5A5D7A;
    line-height: 1.55;
  }
  .pc-card-services span:not(:last-child)::after {
    content: " · ";
    color: #5A5D7A;
    margin: 0 2px;
  }

  .pc-card-headline {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    line-height: 1.3;
    font-weight: 600;
    margin: 16px 0 0 0;
    color: #0E114D;
  }
  .pc-card-headline em {
    font-style: italic;
    font-weight: 600;
  }

  /* On narrow screens, fix card width so they scroll */
  @media (max-width: 900px) {
    .pc-card {
      flex: 0 0 300px;
      min-width: 300px;
    }
    .pc-card-headline { font-size: 20px; }
  }
</style>
</head>
