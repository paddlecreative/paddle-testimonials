<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Creative - Selected Work (v2)</title>
<style>
  /* ============================================================
     PADDLE CREATIVE - WORK CARDS EMBED v2
     Single row with horizontal scroll fallback
     Background matches Qwilr muted pink section
     Images served from Webflow CDN
     ============================================================ */
  html, body {
    background: #EEE3F0 !important;
    margin: 0;
    padding: 0;
  }
  *, *::before, *::after { box-sizing: border-box; }

  .pc-work-embed {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #0E114D;
    padding: 24px 0;
    width: 100%;
  }

  .pc-work-scroller {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #0E114D33 transparent;
    padding-bottom: 8px;
  }
  .pc-work-scroller::-webkit-scrollbar { height: 6px; }
  .pc-work-scroller::-webkit-scrollbar-track { background: transparent; }
  .pc-work-scroller::-webkit-scrollbar-thumb {
    background: #0E114D33;
    border-radius: 999px;
  }

  .pc-work-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 32px;
    min-width: min-content;
  }

  .pc-card {
    flex: 1 1 0;
    min-width: 280px;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s ease;
  }
  .pc-card:hover { transform: translateY(-4px); }
  .pc-card:hover .pc-card-image {
    box-shadow: 0 12px 32px rgba(14, 17, 77, 0.12);
  }

  .pc-card-image {
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 16px;
    overflow: hidden;
    background: #F2F2F2;
    display: block;
    transition: box-shadow 0.25s ease;
  }
  .pc-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .pc-card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }

  .pc-card-brand {
    font-size: 20px;
    font-weight: 600;
    color: #0E114D;
    margin: 0;
  }

  .pc-pill {
    display: inline-block;
    padding: 4px 10px;
    background: #E0F2F1;
    color: #0E114D;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .pc-card-headline {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    line-height: 1.3;
    font-weight: 600;
    margin: 16px 0 0 0;
    color: #0E114D;
  }
  .pc-card-headline em {
    font-style: italic;
    font-weight: 600;
  }

  @media (max-width: 900px) {
    .pc-card {
      flex: 0 0 300px;
      min-width: 300px;
    }
    .pc-card-headline { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- ====== EMBED START ====== -->
<div class="pc-work-embed">
  <div class="pc-work-scroller">
    <div class="pc-work-row">

      <!-- Camascope -->
      <a class="pc-card" href="https://www.paddlecreative.co.uk/work/camascope" target="_blank" rel="noopener">
        <div class="pc-card-image">
          <img alt="Camascope website case study"
               src="https://paddlecreative.github.io/paddle-testimonials/camascope.jpg"
               loading="lazy">
        </div>
        <div class="pc-card-meta">
          <p class="pc-card-brand">Camascope</p>
          <span class="pc-pill">HealthTech</span>
        </div>
        <h3 class="pc-card-headline">Trusted by 3,000+ UK care organisations, connected to Boots, LloydsPharmacy and Well</h3>
      </a>

      <!-- Gaia Fertility -->
      <a class="pc-card" href="https://www.paddlecreative.co.uk/work/gaia-fertility" target="_blank" rel="noopener">
        <div class="pc-card-image">
          <img alt="Gaia Fertility website case study"
               src="https://paddlecreative.github.io/paddle-testimonials/gaia.avif"
               loading="lazy">
        </div>
        <div class="pc-card-meta">
          <p class="pc-card-brand">Gaia Fertility</p>
          <span class="pc-pill">Healthcare / Insurance</span>
        </div>
        <h3 class="pc-card-headline">&euro;23m Series B raised, Top 5 UK startup</h3>
      </a>

      <!-- NeXYs Fertility -->
      <a class="pc-card" href="https://www.paddlecreative.co.uk/work/nexys-fertility" target="_blank" rel="noopener">
        <div class="pc-card-image">
          <img alt="NeXYs Fertility website case study"
               src="https://paddlecreative.github.io/paddle-testimonials/nexys.png"
               loading="lazy">
        </div>
        <div class="pc-card-meta">
          <p class="pc-card-brand">NeXYs Fertility</p>
          <span class="pc-pill">Health</span>
        </div>
        <h3 class="pc-card-headline">From idea to funded in 6 months</h3>
      </a>

    </div>
  </div>
</div>
<!-- ====== EMBED END ====== -->

</body>
</html>
